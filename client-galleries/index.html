<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Client Wedding Galleries | 1234 Weddings</title><meta name="robots" content="noindex,nofollow"/><link rel="stylesheet" href="/delivery.css"/></head><body><main class="page"><section class="hero"><div class="wrap"><a class="back-link" href="/">← Back to 1234 Weddings</a><p class="eyebrow">Private client delivery</p><h1>Client Wedding Galleries</h1><p class="lead">Open your gallery link to view, select, download, and share wedding photos.</p><div id="galleryList" class="gallery-list"></div></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script><script src="/firebase-config.js"></script><script>async function loadPublicGalleries(){const e=document.getElementById('galleryList');try{const t=await db.collection('galleries').where('isPublic','==',true).get(),o=[];t.forEach(e=>o.push(e.data())),o.sort((e,t)=>(t.createdAt?.seconds||0)-(e.createdAt?.seconds||0)),e.innerHTML=o.map(e=>`<a class="gallery-row" href="/gallery/?g=${e.slug}"><div><p class="eyebrow">${e.weddingDate||'Wedding Gallery'}</p><h2>${e.title}</h2><p>${e.location||''}</p></div><strong>Open Gallery →</strong></a>`).join('')||'<div class="notice">No public galleries yet.</div>'}catch(t){e.innerHTML='<div class="notice bad">'+t.message+'</div>'}}loadPublicGalleries()</script></body></html>
